<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#05060a">
    <title>field</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="field" aria-hidden="true"></canvas>

    <div class="grain" aria-hidden="true"></div>

    <main class="stage">
        <header class="masthead">
            <button class="seed" id="seed" type="button" aria-label="regenerate">
                <span>&#9671;</span><span>&#8767;</span><span>&#10177;</span><span>&#9711;</span><span>&#9651;</span><span>&#8251;</span>
            </button>
        </header>

        <div class="dock" role="toolbar" aria-label="controls">
            <button class="chip icon" id="modeBtn" type="button" aria-label="mode">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.5"/>
                    <ellipse cx="12" cy="12" rx="9.5" ry="4" stroke="currentColor" stroke-width="1.5"/>
                    <ellipse cx="12" cy="12" rx="9.5" ry="4" stroke="currentColor" stroke-width="1.5" transform="rotate(60 12 12)"/>
                </svg>
                <span class="dots" id="modeDots"><i></i><i></i><i></i><i></i></span>
            </button>

            <button class="chip icon" id="paletteBtn" type="button" aria-label="palette">
                <span class="swatches" id="swatches"><i></i><i></i><i></i><i></i></span>
            </button>

            <label class="chip slider" aria-label="density">
                <svg viewBox="0 0 24 24">
                    <g fill="currentColor">
                        <circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/>
                        <circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/>
                        <circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/>
                    </g>
                </svg>
                <input id="density" type="range" min="40" max="100" value="55" aria-label="density">
            </label>

            <label class="chip slider" aria-label="flux">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2 12h4l3-7 4 14 3-7h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input id="flux" type="range" min="1" max="100" value="35" aria-label="flux">
            </label>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
